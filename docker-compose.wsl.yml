services:
  synthgpu-core:
    network_mode: host
    ports: !reset []
    networks: !reset []
    extra_hosts: !reset []

  synthgpu-client-node:
    network_mode: host
    environment:
      - SYNTHGPU_API_URL=http://localhost:8000
      - OLLAMA_HOST=http://localhost:11434
    command: >
      sh -c "
        echo '=== SynthGPU Client Node (WSL host network) ===' &&
        echo 'Backend: http://localhost:8000' &&
        python3 -c \"import urllib.request; print(urllib.request.urlopen('http://localhost:8000/api/device/status', timeout=5).read().decode())\" || true &&
        echo 'Client node ready. Keeping alive for exploration.' &&
        tail -f /dev/null
      "
    networks: !reset []

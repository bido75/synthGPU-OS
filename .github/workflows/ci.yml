name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Frontend Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 2. Backend Lint & Test ────────────────────────────────────────────────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/ synthgpu/ --ignore E501

      - name: Run tests (if any)
        run: |
          pip install pytest
          pytest --tb=short -q || echo "No tests yet — skipping"

  # ── 3. Release (main only) ───────────────────────────────────────────────────
  release:
    name: Create Release Artifact
    needs: [frontend-build, backend-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Package release
        run: |
          mkdir -p release/SynthGPU
          cp -r backend release/SynthGPU/
          cp -r frontend/dist release/SynthGPU/frontend-dist
          cp -r synthgpu release/SynthGPU/
          cp requirements.txt release/SynthGPU/
          cp start.bat release/SynthGPU/ 2>/dev/null || true
          cp README.md release/SynthGPU/ 2>/dev/null || true
          cd release && zip -r ../SynthGPU-${{ github.sha }}.zip SynthGPU/

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: SynthGPU-release-${{ github.sha }}
          path: SynthGPU-*.zip
          retention-days: 30

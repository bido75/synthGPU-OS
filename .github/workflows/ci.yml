name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  IMAGE_NAME: ghcr.io/bido75/synthgpu-os

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest ruff
      - name: Critical lint checks
        run: ruff check backend tests probe_v03.py --select E9,F63,F7,F82
      - name: Unit tests
        run: pytest tests --ignore=tests/e2e --tb=short -q

  container:
    name: Container build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: synthgpu-os:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  package:
    name: Release artifact
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      - name: Package source distribution
        run: |
          mkdir -p release/synthgpu-os/frontend
          cp -r backend cuda_shim vulkan_icd scripts release/synthgpu-os/
          cp -r frontend/dist release/synthgpu-os/frontend/dist
          cp Dockerfile docker-compose.yml requirements.txt README.md .env.example release/synthgpu-os/
          cd release
          zip -r ../synthgpu-os-${GITHUB_SHA}.zip synthgpu-os
      - uses: actions/upload-artifact@v4
        with:
          name: synthgpu-os-${{ github.sha }}
          path: synthgpu-os-*.zip
          retention-days: 30

  publish:
    name: Publish container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend, container]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
